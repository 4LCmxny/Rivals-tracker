<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rivals Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      color: #38bdf8;
    }

    .leaderboard {
      margin: 20px auto;
      width: 80%;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px #38bdf8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    th {
      color: #38bdf8;
    }

    tr:hover {
      background: #334155;
    }
  </style>
</head>

<body>

<h1>🔥 Rivals Leaderboard Tracker 🔥</h1>

<div class="leaderboard">
  <h2>🏆 Top Wins</h2>
  <table>
    <tr><th>Player</th><th>Wins</th></tr>
    <tr><td>NoobMaster</td><td>520</td></tr>
    <tr><td>ProSlayer</td><td>480</td></tr>
  </table>
</div>

<div class="leaderboard">
  <h2>🎯 Most Kills</h2>
  <table>
    <tr><th>Player</th><th>Kills</th></tr>
    <tr><td>ShadowX</td><td>12,400</td></tr>
    <tr><td>SniperGod</td><td>11,900</td></tr>
  </table>
</div>

<div class="leaderboard">
  <h2>⭐ Highest Level</h2>
  <table>
    <tr><th>Player</th><th>Level</th></tr>
    <tr><td>ElitePro</td><td>210</td></tr>
    <tr><td>GrindKing</td><td>198</td></tr>
  </table>
</div>

</body>
</html>
